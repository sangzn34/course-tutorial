services:
  postgres:
    image: postgres:16-alpine
    container_name: my-postgres-dev
    environment:
      POSTGRES_DB: my_coffee_db
      POSTGRES_USER: coffee
      POSTGRES_PASSWORD: coffee_dev_password
    ports:
      - '5433:5432'
    volumes:
      - my_postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD', 'pg_isready', '-U', 'coffee' ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  my_postgres_dev_data:
