# Publish docs/slides/ → GitHub Pages (static HTML decks)
# ตั้งครั้งเดียว: repo → Settings → Pages → Source = "GitHub Actions"
# URL: https://sangzn34.github.io/course-tutorial/

name: Deploy slides to Pages

on:
  push:
    branches: [main]
    paths: ['docs/slides/**'] # redeploy เฉพาะตอน slides เปลี่ยน
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/slides # เผยแพร่โฟลเดอร์นี้เป็น root ของ Pages
      - id: deployment
        uses: actions/deploy-pages@v4
