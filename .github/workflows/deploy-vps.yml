# V3 — CI/CD: push main → build → migrate → deploy VPS (ไม่ ssh มือ ไม่ build บน VPS)
#
# GitHub Secrets ที่ต้องตั้ง (repo → Settings → Secrets and variables → Actions):
#   DATABASE_URL   — Supabase pooled (6543)   ── ใช้ตอน migrate
#   DIRECT_URL     — Supabase direct (5432)    ── migrate จริงวิ่งผ่านตัวนี้
#   VPS_HOST       — 66.42.54.32
#   VPS_SSH_KEY    — private key ของ user deploy (ตรงกับ pubkey ใน authorized_keys)
#
# ต้องทำครั้งเดียวก่อน: §A (user deploy + key บน VPS) · วาง infra/* + .env ที่ /srv/coffee
# GHCR package: ตั้งเป็น public (Packages → package → settings → public) ไม่งั้น VPS pull ไม่ได้

name: Deploy VPS

on:
  push:
    branches: [main] # deploy จาก main เท่านั้น
  workflow_dispatch: {} # กดรันเองได้จากหน้า Actions

env:
  IMAGE: ghcr.io/sangzn34/course-tutorial

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push ขึ้น GHCR
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # ฟรี ไม่ต้องสร้าง PAT
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    needs: build # build ผ่านก่อน (image ใช้ได้) แล้วค่อย migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # อ่าน version จาก field packageManager
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:deploy:ci # prisma migrate deploy (ไม่ใช่ dev — partialIndexes preview)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }} # prisma.config ใช้ DIRECT_URL ?? DATABASE_URL

  deploy:
    needs: [build, migrate] # migrate เสร็จก่อนสลับ app เสมอ (schema ใหม่รอโค้ดใหม่)
    runs-on: ubuntu-latest
    steps:
      # sync compose + Caddyfile ขึ้น VPS (เผื่อแก้ในรีโป จะได้ไม่ drift)
      - uses: actions/checkout@v4
      - uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'infra/docker-compose.prod.yml,infra/Caddyfile'
          target: /srv/coffee
          strip_components: 1 # ตัด infra/ ออก → ไฟล์ลงตรง /srv/coffee/
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /srv/coffee
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
