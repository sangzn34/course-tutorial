# V3 — CI/CD: push main → build → migrate → deploy VPS (ไม่ ssh มือ ไม่ build บน VPS)
#
# repo → Settings → Secrets and variables → Actions
# Secrets (เปิดดูค่าไม่ได้):
#   VPS_SSH_KEY    — private key ของ user deploy — private key ห้ามเป็น Variable เด็ดขาด
# Variables (เปิดดูได้ — teaching: เห็นค่าจริงเพื่อสอน):
#   VPS_HOST       — 66.42.54.32 (แค่ IP ไม่ลับ)
#   DATABASE_URL   — Supabase pooled (6543)  ── ⚠️ มีรหัส DB! เป็น Variable เพราะสอน (DB เรียนทิ้งได้)
#   DIRECT_URL     — Supabase direct (5432)  ──    prod จริง = ย้ายเป็น Secret + rotate รหัส
#
# ต้องทำครั้งเดียวก่อน: §A (user deploy + key บน VPS) · วาง infra/* + .env ที่ /srv/coffee
# GHCR package: ตั้งเป็น public (Packages → package → settings → public) ไม่งั้น VPS pull ไม่ได้

name: Deploy VPS

on:
  # ⏸️ ปิด auto-deploy ชั่วคราว — ใช้ Vercel ก่อน. เปิดคืน: uncomment 2 บรรทัดล่าง
  # push:
  #   branches: [main]        # deploy จาก main เท่านั้น
  workflow_dispatch: {} # ยังรันมือได้ (Actions → Deploy VPS → Run workflow)

env:
  IMAGE: ghcr.io/sangzn34/course-tutorial

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push ขึ้น GHCR
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # ฟรี ไม่ต้องสร้าง PAT
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    needs: build # build ผ่านก่อน (image ใช้ได้) แล้วค่อย migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # อ่าน version จาก field packageManager
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:deploy:ci # prisma migrate deploy (ไม่ใช่ dev — partialIndexes preview)
        env:
          # ⚠️ teaching shortcut: ใช้ vars (อ่านค่าได้) เพื่อสอนให้เห็น connection string จริง
          # ปกติ = secrets (มีรหัส DB) — ก่อนใช้ prod จริง/มีข้อมูลจริง ย้ายเป็น secrets + rotate รหัส
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          DIRECT_URL: ${{ vars.DIRECT_URL }} # prisma.config ใช้ DIRECT_URL ?? DATABASE_URL

  deploy:
    needs: [build, migrate] # migrate เสร็จก่อนสลับ app เสมอ (schema ใหม่รอโค้ดใหม่)
    runs-on: ubuntu-latest
    steps:
      # sync compose + Caddyfile ขึ้น VPS (เผื่อแก้ในรีโป จะได้ไม่ drift)
      - uses: actions/checkout@v4
      - uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'infra/docker-compose.prod.yml,infra/Caddyfile'
          target: /srv/coffee
          strip_components: 1 # ตัด infra/ ออก → ไฟล์ลงตรง /srv/coffee/
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /srv/coffee
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
